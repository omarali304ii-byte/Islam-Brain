# ATLAS Era 20 — Decision Layer — Cielito Egypt (base 360, 2026-07-09)
# Agent: A92 (KPI covenant). The vital-signs the client must watch. Baselines = captured HELD values;
# targets = directional (no fabricated end-state numbers; all uplift "to be baselined" against client data).

covenant:
  - kpi: "Owned Instagram engagement rate"
    baseline: "0.006% median (likes+comments / 88,903 followers, n=17 owned, 2026-05-31->07-04) [S08]"
    direction: "UP — measure ONLY on new-format posts (masri caption + UGC/skit); first covenant: 10x the owned median within 8 weeks"
    why: "The single starkest health signal; the whole D-01/D-03 thesis lives or dies here"
  - kpi: "Owned-vs-earned engagement ratio"
    baseline: "~1:190 (owned median 655 views vs earned peak 124,937) [S08]"
    direction: "COMPRESS toward 1:20 by moving earned formats in-house + reposting winners"
    why: "Quantifies the wasted flywheel; the wedge WOM sells"
  - kpi: "WhatsApp conversion path"
    baseline: "0 CTAs on any captured surface (site, IG bio, 17/17 captions, TikTok bio) [S03,S08,S10]"
    direction: "LIVE within days; then baseline chats/week and chat->order once client shares order data (G-01)"
    why: "Highest-leverage, near-zero-cost conversion fix in an Egyptian D2C"
  - kpi: "TikTok efficiency (followers per video)"
    baseline: "13.0 (7,608 followers / 584 videos) [S09]"
    direction: "UP — de-mix founder-journey content, concentrate on Arabic product-entertainment"
    why: "Effort-without-strategy signal; >500 videos posted for a 7.6K base"
  - kpi: "Mobile PageSpeed"
    baseline: "55 mobile / 98 desktop [S06]"
    direction: "UP to >=80 mobile before any paid traffic"
    why: "Conversion leak at the last click of every campaign in a mobile-first market"
  - kpi: "Catalog hygiene score"
    baseline: "128/250 SKUs untyped; >=4 duplicate/near-duplicate collections; inverted compare-at prices present [S04,S05]"
    direction: "UP to 100% typed, 0 duplicate collections, 0 inverted prices before product-feed ads"
    why: "Advantage+/DPA product-feed ads misfire until this is clean"
  - kpi: "UGC velocity"
    baseline: "12+ distinct creators tagging in a 60-post window incl. founder (awadlolwa) 8 posts [S08]"
    direction: "UP via seeding 10 micro-creators/month with usage-rights capture"
    why: "The proven demand engine; formalize it"
  - kpi: "Discount surface"
    baseline: "96/250 SKUs on sale (38%) [S04]"
    direction: "DOWN/DISCIPLINED — set a max-discount-surface covenant once positioning (D-05) is set"
    why: "38% discounting with no stated differentiator = commodity drift vs Dejavu scale"
